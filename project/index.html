<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page with Feedback</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4a90e2 0%, #50e3c2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .login-panel,
        .feedback-panel {
            width: 360px;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .login-header {
            padding: 32px;
            background: #4a90e2;
            color: #fff;
            text-align: center;
        }

        .login-header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .login-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .login-form,
        .feedback-form {
            padding: 28px 32px 32px;
        }

        .feedback-panel h2 {
            text-align: center;
            color: #4a90e2;
            padding-top: 25px;
        }

        .feedback-panel p {
            text-align: center;
            color: #666;
            margin: 10px 20px 20px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #dcdce3;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus,
        textarea:focus {
            border-color: #4a90e2;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .login-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .login-actions label {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 0;
        }

        .login-actions input[type="checkbox"] {
            width: auto;
        }

        .login-actions a {
            color: #4a90e2;
            text-decoration: none;
            font-size: 13px;
        }

        .login-actions a:hover,
        .footer-note a:hover {
            text-decoration: underline;
        }

        .login-button,
        .feedback-button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-button {
            background: #4a90e2;
        }

        .login-button:hover {
            background: #3b78c6;
        }

        .feedback-button {
            background: #50e3c2;
        }

        .feedback-button:hover {
            background: #2dc8a6;
        }

        .footer-note {
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
            color: #777;
        }

        .footer-note a {
            color: #4a90e2;
            text-decoration: none;
        }

        @media (max-width: 420px) {
            .login-panel,
            .feedback-panel {
                width: 95%;
            }

            .login-form,
            .feedback-form {
                padding: 20px;
            }

            .login-actions {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>

<body>

    <!-- Login Section -->
    <div class="login-panel">
        <div class="login-header">
            <h1>Welcome Back</h1>
            <p>Sign in to continue to your account</p>
        </div>

        <form class="login-form">

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password" required>
            </div>

            <div class="login-actions">
                <label>
                    <input type="checkbox">
                    Remember Me
                </label>

                <a href="#">Forgot Password?</a>
            </div>

            <button class="login-button">Log In</button>

            <p class="footer-note">
                New here?
                <a href="#">Create an account</a>
            </p>

        </form>
    </div>

    <!-- Feedback Section -->
    <div class="feedback-panel">

        <h2>Feedback</h2>
        <p>We value your feedback. Please share your experience with us.</p>

        <form class="feedback-form">

            <div class="form-group">
                <label>Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Your Feedback</label>
                <textarea placeholder="Write your feedback here..." required></textarea>
            </div>

            <button class="feedback-button">
                Submit Feedback
            </button>

        </form>

    </div>

</body>
</html>
