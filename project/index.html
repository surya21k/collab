<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4a90e2 0%, #50e3c2 100%);
            min-height: 100vh;
            display: grid;
            place-items: center;
        }
        .login-panel {
            width: 360px;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }
        .login-header {
            padding: 32px;
            background: #4a90e2;
            color: #fff;
            text-align: center;
        }
        .login-header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 0.02em;
        }
        .login-header p {
            margin: 8px 0 0;
            opacity: 0.85;
            font-size: 14px;
        }
        .login-form {
            padding: 28px 32px 32px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #dcdce3;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease;
        }
        input:focus {
            border-color: #4a90e2;
        }
        .login-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .login-actions a {
            color: #4a90e2;
            text-decoration: none;
            font-size: 13px;
        }
        .login-button {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 12px;
            background: #4a90e2;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .login-button:hover {
            background: #3b78c6;
            transform: translateY(-1px);
        }
        .footer-note {
            margin-top: 14px;
            text-align: center;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>

<body>

    <!-- Login Section -->
    <div class="login-panel">
        <div class="login-header">
            <h1>Welcome Back Buddy</h1>
            <p>Sign in to continue to your account</p>
        </div>

        <form class="login-form">

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password" required>
            </div>

            <div class="login-actions">
                <label>
                    <input type="checkbox">
                    Remember Me
                </label>

                <a href="#">Forgot Password?</a>
            </div>

            <button class="login-button">Log In</button>

            <p class="footer-note">
                New here?
                <a href="#">Create an account</a>
            </p>

        </form>
    </div>

    <!-- Feedback Section -->
    <div class="feedback-panel">

        <h2>Feedback</h2>
        <p>We value your feedback. Please share your experience with us.</p>

        <form class="feedback-form">

            <div class="form-group">
                <label>Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Your Feedback</label>
                <textarea placeholder="Write your feedback here..." required></textarea>
            </div>

            <button class="feedback-button">
                Submit Feedback
            </button>

        </form>

    </div>

</body>
</html>
