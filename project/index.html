<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4a90e2,#50e3c2);
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding:40px 20px;
        }

        /* Login Card */

        .login-panel{
            width:380px;
            background:#fff;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 15px 35px rgba(0,0,0,.2);
            margin-bottom:30px;
        }

        .login-header{
            background:#4a90e2;
            color:white;
            text-align:center;
            padding:30px;
        }

        .avatar{
            width:80px;
            height:80px;
            border-radius:50%;
            background:white;
            color:#4a90e2;
            font-size:40px;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:auto;
            margin-bottom:15px;
        }

        .login-header h1{
            margin-bottom:8px;
        }

        .login-form{
            padding:30px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#333;
        }

        input,
        textarea,
        select{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:15px;
            outline:none;
        }

        input:focus,
        textarea:focus,
        select:focus{
            border-color:#4a90e2;
        }

        textarea{
            resize:vertical;
        }

        .login-actions{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .login-actions label{
            display:flex;
            align-items:center;
            gap:5px;
            font-size:14px;
            font-weight:normal;
        }

        .login-actions input{
            width:auto;
        }

        .login-actions a{
            text-decoration:none;
            color:#4a90e2;
            font-size:14px;
        }

        .btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
            color:white;
            transition:.3s;
            margin-top:10px;
        }

        .login-btn{
            background:#4a90e2;
        }

        .login-btn:hover{
            background:#357bd8;
        }

        .google-btn{
            background:#db4437;
        }

        .google-btn:hover{
            background:#c13529;
        }

        .footer-note{
            margin-top:15px;
            text-align:center;
            font-size:14px;
        }

        .footer-note a{
            color:#4a90e2;
            text-decoration:none;
        }

        /* Feedback */

        .feedback-panel{
            width:380px;
            background:white;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 15px 35px rgba(0,0,0,.2);
        }

        .feedback-header{
            background:#4a90e2;
            color:white;
            text-align:center;
            padding:20px;
        }

        .feedback-form{
            padding:30px;
        }

        footer{
            margin-top:30px;
            color:white;
            font-size:14px;
        }

        @media(max-width:450px){

            .login-panel,
            .feedback-panel{
                width:95%;
            }

            .login-actions{
                flex-direction:column;
                align-items:flex-start;
                gap:10px;
            }

        }

    </style>
</head>

<body>

    <!-- LOGIN SECTION -->

    <div class="login-panel">

        <div class="login-header">

            <div class="avatar">
                👤
            </div>

            <h1>Welcome Back!</h1>

            <p>Login to continue to your account</p>

        </div>

        <form class="login-form">

            <div class="form-group">

                <label>Email Address</label>

                <input
                    type="email"
                    placeholder="📧 Enter your email"
                    required>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                    id="password"
                    type="password"
                    placeholder="🔒 Enter your password"
                    required>

            </div>

            <div class="login-actions">

                <label>

                    <input
                        type="checkbox"
                        onclick="document.getElementById('password').type=this.checked?'text':'password'">

                    Show Password

                </label>

                <a href="#">Forgot Password?</a>

            </div>

            <button class="btn login-btn">
                Login
            </button>

            <button
                type="button"
                class="btn google-btn">

                Login with Google

            </button>

            <p class="footer-note">

                Don't have an account?

                <a href="#">Create Account</a>

            </p>

        </form>

    </div>

    <!-- FEEDBACK SECTION -->

    <div class="feedback-panel">

        <div class="feedback-header">

            <h2>Feedback Form</h2>

            <p>We value your feedback!</p>

        </div>

        <form class="feedback-form">

            <div class="form-group">

                <label>Full Name</label>

                <input
                    type="text"
                    placeholder="Enter your full name"
                    required>

            </div>

            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    placeholder="Enter your email"
                    required>

            </div>

            <div class="form-group">

                <label>Rate Our Website</label>

                <select>

                    <option>⭐⭐⭐⭐⭐ Excellent</option>
                    <option>⭐⭐⭐⭐ Good</option>
                    <option>⭐⭐⭐ Average</option>
                    <option>⭐⭐ Poor</option>
                    <option>⭐ Very Poor</option>

                </select>

            </div>

            <div class="form-group">

                <label>Your Feedback</label>

                <textarea
                    rows="5"
                    placeholder="Write your feedback here..."
                    required></textarea>

            </div>

            <button class="btn login-btn">

                Submit Feedback

            </button>

        </form>

    </div>

    <footer>

        © 2026 Login Portal | Designed by Pavan Teja

    </footer>

</body>
</html>
